[tips-and-tricks-item-description]
orbital-cannon=Orbital catapults provide a direct link to a target surface, no rockets or capsules are needed. It both sends and receives items.\n\nYou can place as many as you want on each surface.\n The receiving end of the catapult can be filtered to restrict what items can come to the planet, and you can read the current contents of both sides via circuits.\n\n The valid connections are marked on your space map as red lines.

