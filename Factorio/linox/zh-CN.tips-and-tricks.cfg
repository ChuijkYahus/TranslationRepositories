[tips-and-tricks-item-description]
linox-tips-and-tricks_briefing=[planet=linox-planet_linox]（Linox），一个极其危险的世界，比祝融星还要靠近太阳。日冕抛射和耀斑爆发直达星球表面，摧毁途经的一切事物。太阳强大的引力则无情地搓揉扭曲着这颗星球，制造出极端、恶劣的环境。这种星球上真的还有值得探索的东西吗？
linox-tips-and-tricks_language-settings=在前往日凌星之前，强烈建议将图片中展示的选项设置为你希望使用的语言。这些设置用于本地化递归蓝图示例，能在游玩过程中起到极大的帮助。\n\n此外，若在个性设置中更改了语言，可以请求L.O.R.A.X再次恢复示例，这样就能改变示例所用的语言了。
linox-tips-and-tricks_exploration-log-1=远距离扫描显示，太阳发出的巨量热已经熔化了星球的地表，很难找到合适的降落场地。为探索星球，必须先在在轨太空平台上进行考察。直接降落必然会导致死亡。
linox-tips-and-tricks_exploration-log-2=在飞船上多次扫描地表之后，雷达终于有了反应。而令人惊奇的是，一座来源不明的[entity=cargo-landing-pad]就这样直接坐落在岩浆海当中。远程访问时，你发现它已被配置为拒绝所有类型的降落请求。并且由于强安全协议的限制，在可接受的时间内此配置无法改变；但考虑到自身文明的习惯，载人降落大概率依然是可行的。\n\n强制载人降落可行，但务必注意：受强烈日冕活动和接驳站拒绝载货降落的影响，在轨太空平台将无法发送任何补给。你的生存无法得到保证。是否继续？
linox-tips-and-tricks_cargo-loss=[planet=linox-planet_linox]太过接近恒星，以至于日冕抛射和耀斑爆发能直达星球表面。货舱可能会因此受损或被摧毁，且仅约30%的货物能成功降落。研究入轨安全性科技可提高降落成功率。\n\n * 运载玩家的货舱不会被摧毁。\n * 基础成功率：30%\n * 每级入轨安全性科技都将追加5%的成功率。\n * 对货舱内各物品槽位分别计算成功率。损失的物品会被移出槽位。
linox-tips-and-tricks_placement_restriction=只有少数几种实体可以放置在[tile=linox-tile_linox-terminal-platform]、[tile=linox-tile_linox-hazard-terminal-platform]、[tile=linox-tile_linox-corridor]、[tile=linox-tile_linox-datacenter]上。\n特别地，[entity=linox-building_cargo-elevator]和[entity=linox-building_fluid-elevator]只能放置在[tile=linox-tile_linox-terminal-platform]和[tile=linox-tile_linox-hazard-terminal-platform]上。
linox-tips-and-tricks_planetary-power-network=日凌星已经搭建有庞大的星球电力网络。因此，你无需搭建电线杆，且地表与地下的电力网络之间互通。
linox-tips-and-tricks_npc-system=NPC是能影响游戏流程的特殊实体，其名称在实体下方以黄色显示。部分NPC可以通过点击交互。

linox-tips-and-tricks_recursive-blueprints=递归蓝图系统能够完全自动化蓝图的放置和拆除。借助此系统，你可以在极为狭小的区域内自动化多种物品的生产。\n下方的条目将简要介绍日凌星上的递归蓝图示例，并解释其功能。\n\n警告 – 本页的模拟与游戏内的实际示例有些许不同，前者的配置能够清晰展示递归蓝图系统的标准行为。
linox-tips-and-tricks_example-turn-on=启动示例需要两步。\n\n第一步，在示例上部找到输出[virtual-signal=signal-green]的[item=constant-combinator]并开启。\n\n第二步，开关一次下方的暂停信号（先开启再关闭）以重置系统。这之后，系统就能正常运作了。
linox-tips-and-tricks_bad-chest=示例信号网络所用的蓝图可在图中[item=blueprint-deployer2]内的蓝图簿处查看。该蓝图簿中蓝图的顺序非常重要，具体见下一提示条目。
linox-tips-and-tricks_id-box=示例的中部有两个[item=constant-combinator]。这些ID盒用于为物品信号选择[item=blueprint-deployer2]中蓝图簿内的蓝图。\n例如，若[item=iron-plate]信号的值为4，则发送[item=iron-plate]信号时会选取蓝图簿内的第四份蓝图。值越小（蓝图簿中越靠上）优先级越高。\n\n但为什么要用两个[item=constant-combinator]呢？详情见下一页！
linox-tips-and-tricks_negative-signal=示例底部有四个输出物品信号的[item=constant-combinator]。这些运算器用于设置物品信号的输出条件。左侧两个会输出反转物品信号，适用于能减少对应物品库存的蓝图。\n\n第一个运算器会在特定物品库存低于特定值时关闭。在示例中，[item=stone]信号的值为1500，也即[item=stone]库存小于等于1500时信号关闭。注意，这里设置的是关闭条件——信号不会在库存升至1500以上时重新开启。开启条件在第二个运算器处。\n\n第二个运算器会在特定物品库存高于特定值时开启。在示例中，[item=stone]信号的值为3000，也即[item=stone]库存超过3000时信号开启。
linox-tips-and-tricks_positive-signal=右侧的两个输出的也是物品信号，但和反转信号不一样，它们适用于能增加对应物品库存的蓝图。\n\n第三个运算器会在特定物品库存低于特定值时开启。在示例中，[item=iron-plate]信号的值为500，也即[item=iron-plate]库存小于等于500时信号开启。其他细节与反转信号一致。\n\n第四个运算器会在特定物品库存高于特定值时关闭。在示例中，[item=iron-plate]信号的值为2000，也即[item=iron-plate]库存超过2000时信号关闭。
linox-tips-and-tricks_hover-tips=示例中的运算器都有相应的重要描述。务必点开运算器或悬停在运算器上查看详情。

#linox-tips-and-tricks_rs-latch=RS锁存器是能根据条件置位或复位输出信号的网络。它能在输入条件改变前保持当前输出。\n此示例中，RS锁存器被用于管理库存量，即将[item=copper-plate]的量维持在特定值以上，将[item=stone]的量维持在特定值以下。\n\n图片里，红色的[item=copper-plate]信号网络会在库存低于500时置位，并在超过1000时复位。\n右侧的蓝色[item=stone]信号网络则会在库存超过2000时置位，低于1000时复位。\n\n务必注意：这两者虽然都是RS锁存器，但其设置会根据行为相应变动。RS锁存器置位后，信号网络即会输出[item=constant-combinator]中保存的值。\n注意，不同物品的输出值也不同。这些值代表了蓝图的顺序和优先级——值越小优先级越高。
#linox-tips-and-tricks_signal-converter=以紫色标记的信号网络会接受多个RS锁存器发出的输入，并从中选出值最小的信号，而后将其转换为递归蓝图信号。\n递归蓝图信号的更多信息参见该模组自身的提示。\n\n绿色标记的信号网络会在递归蓝图信号变化时短暂中断输出。与此同时，网络会触发一次拆除命令，拆除先前放置的蓝图。
#linox-tips-and-tricks_bad-chest=最终的信号会送至递归蓝图模组的蓝图自动部署箱。该箱中存储着建设所需的蓝图簿。还记得RS锁存器条目里提到，不同物品的值不同吗？该值即是选用蓝图的依据。\n\n蓝图自动部署箱左侧的[item=constant-combinator]设定了该箱的工作区域，也用于提供拆除信号。放置信号的优先级高于拆除信号。
linox-tips-and-tricks_bad-chest-area-viewer=蓝图自动部署箱区域指示器能通过图像显示蓝图自动部署箱的工作区域和中心点。工作区域是拆除命令的操作范围，中心点则是蓝图的放置位置——务必认真检查。
linox-tips-and-tricks_adjust-blueprint-origin=有些时候，蓝图的放置位置可能会偏离预期，如红框所示。\n而为进行修正，需要在蓝图编辑器内调整蓝图原点——见橙框，修改当前分别为6和8的X和Y值。\n这些值会更改蓝图的放置锚点（旗标地格的左上角）。\n调整后，蓝图的放置位置就应如绿框所示恢复正常。

linox-tips-and-tricks_power-converter=功率转换器是能为日凌星设施提供大量电力容量的系统。这台特殊蓄电器的下方有信号网络的输入和输出端口，可供连接信号线，以对功率转换器进行控制。
linox-tips-and-tricks_reactive-power=你好，搭档。这里是L.O.R.A.X。我发出这条紧急信息，是因为功率转换器的使用有一项注意事项。\n\n当前，功率转换器的主控电路已经受损。也正因此，[color=yellow]启动功率转换器可能会产生“无功功率”，最多会将总能耗提升至原本的2倍[/color]。为解决此问题，你必须使用信号网络直接实现主控电路的功能。\n[color=yellow]我们需要做的是提供合适的辅助功率进行无功补偿。[/color]不必担心。这并没有听起来那样困难，实际效果和原先相比也只有极少量的精度下降。\n\n\n功率转换器会输出以下信号：\n\n[virtual-signal=signal-P]代表当前的总能耗，无功功率不计，单位为瓦特（W）。\n[virtual-signal=signal-O]代表功率转换器用于抵消无功功率的输出，单位为瓦特（W）。\n\n[color=yellow]我们的目标是让[virtual-signal=signal-O]的值尽可能接近[virtual-signal=signal-P]。[/color]\n[virtual-signal=signal-O]的值无法直接控制，而是只能通过输入信号间接影响。\n\n\n功率转换器会接受以下输入信号：\n\n[virtual-signal=signal-E]，此信号值不为0时即启动功率转换器。启动后，电力容量会提高5 GJ，但同时也会产生无功功率。\n如果不想调控无功功率，可以选择不发出此信号以关闭转换器，但也同时会导致电力容量恢复到原来的水平。\n\n[virtual-signal=signal-I]能控制功率转换器的输出。\n将[virtual-signal=signal-I]的值设为大于等于1，会导致输出值升高。\n将[virtual-signal=signal-I]的值设为小于等于-1，会导致输出值降低。\n\n功率转换器的输出无法直接设置，而是只能通过输入值为正数或负数的信号进行增减。\n\n\n若用汽车类比，那么[virtual-signal=signal-I]和油门有些类似。\n即便把油门踩到底，车本身也要花时间才能达到最高速度。\n\n在正确时机提供相应值的[virtual-signal=signal-I]，即可将功率转换器的输出控制在预期水平。\n\n如果控制得当，电网统计中的无功功率就将大幅降低。祝你好运！
linox-tips-and-tricks_placement_restriction_2=箱子、[item=linox-building_core-roboport]、[item=accumulator]可以放置在[tile=linox-tile_linox-facility-platform]、[tile=linox-tile_linox-hazard-facility-platform]地格上。对于其他事物，限制1条目中的限制依然适用。