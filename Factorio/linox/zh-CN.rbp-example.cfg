[rbp-example]
language-code=zh-CN

panel_description_1=如何为BAD系统创建和加入可用蓝图：\n\n第1步：复制一份标混地板（Concrete Flooring）蓝图。\n见蓝图自动部署箱内的蓝图簿。\n\n第2步：根据用途重命名蓝图。
panel_description_1_1=第3步：为蓝图选取新内容（包括地格）。\n\n第4步：将该蓝图放入蓝图簿。
panel_description_1_2=第5步：向常量运算器写入库存阈值和蓝图序号。
panel_description_2=提示：不停止系统但开启暂停按钮，可减少UPS消耗。这也是创建/更新蓝图的建议方式。\n\n提示：如需查看BAD箱的中心点，请停止系统并使用“蓝图自动部署箱区域指示器”显示建设范围。
panel_description_2_1=提示：创建/更新蓝图前务必开启暂停按钮。\n\n暂停按钮开启时会点亮红照明灯。\n\n如需“清空台面”，请关闭暂停按钮后再次开启。
panel_description_2_2=

panel_stage=阶段指示器，指示当前处于哪一个阶段。
panel_request=请求指示器，指示请求所在的阶段。

combinator_turn_on=绿色 = 开启
combinator_parameter=坐标与尺寸参数。\n\n关闭前需先切断连接至蓝图自动部署箱的信号线。\n\n提示：点击快捷栏中的“蓝图自动部署箱区域指示器”可查看中心点坐标。
combinator_deconstruction=拆除信号
combinator_construction=建设信号
combinator_stepper=步进器
combinator_signal_converter=信号转换器
combinator_signal_retarder=信号延迟器
combinator_signal_sorter=此运算器用于指定选取哪份蓝图，从优先级最高的产品开始选取。
combinator_pause=暂停按钮\n\n若想要创建/更新蓝图，请开启此运算器。
    
combinator_signal_filter_1=阶段1信号筛选器
combinator_signal_filter_2=阶段2信号筛选器
combinator_id_box_1=ID盒 - 阶段1\n\n产品的信号值应当与蓝图在蓝图簿中的位置相符。\n\n产品之间有优先级系统，1对应最高优先级。
combinator_id_box_2=ID盒 - 阶段2\n\n产品的信号值应当与蓝图在蓝图簿中的位置相符。\n\n产品之间有优先级系统，1对应最高优先级。
combinator_signal_gate_1=阶段1信号门
combinator_signal_gate_2=阶段2信号门
combinator_latch_negative=产品锁存器\n\n负向版本：高信号锁存，低信号解锁
combinator_latch_positive=产品锁存器\n\n正向版本：低信号锁存，高信号解锁

combinator_gate_negative_high=高通门：库存存量多于所设值时输出相应产品的信号，值为1。
combinator_gate_negative_low=低通门：库存存量少于所设值时输出相应产品的信号，值为1。
combinator_gate_positive_high=高通门：库存存量多于所设值时输出相应产品的信号，值为1。
combinator_gate_positive_low=低通门：库存存量少于所设值时输出相应产品的信号，值为1。

combinator_box_negative_high=负向版本：\n\n上阈值\n\n此列表内的产品将在库存存量超过所设限制时启动制造。
combinator_box_negative_low=负向版本：\n\n下阈值\n\n此列表内的产品将在库存存量低于所设限制时停止制造。
combinator_box_positive_high=正向版本：\n\n上阈值\n\n此列表内的产品将在库存存量超过所设限制时停止制造。
combinator_box_positive_low=正向版本：\n\n下阈值\n\n此列表内的产品将在库存存量低于所设限制时启动制造。