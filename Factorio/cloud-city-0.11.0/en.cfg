[tips-and-tricks-item-description]
flying-platforms=Some planets don't have a solid surface, and on those the only option is to build in their atmosphere. The only way to make it stable is to build in areas with a strong updraft that can carry the weight of a platform.
integration-hint=Some machines can directly interact with flying platforms, either by drawing power from them or by giving them more functionality. They also can't be placed near each other, the distance is marked by the orange border around them. \n\n These machines also don't work outside of flying platforms.
