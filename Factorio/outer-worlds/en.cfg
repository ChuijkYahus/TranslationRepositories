[mod-setting-description]
outer-worlds-vesta-cubium-patch=Makes Cubium a moon of Vesta.
outer-worlds-vesta-patches=Moves Vesta out of the asteroid field if present, to a location normally under the outer rim on the map.
outer-worlds-vesta-cubium-cannon-links=Cubium is now exclusively reachable from vesta via orbital catapult. This intends to make it a little less convinient to get stuff off the planet as a balancing attempt.