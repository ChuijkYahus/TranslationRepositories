[mod-name]
skewer_planet_vesta=○🌐Vesta

[mod-description]
skewer_planet_vesta=A gas giant in the distance. There appears to be a lone chunks of rock spread about in the almost concerningly thick atmosphere. Vesta is the gas world, and all about gasses. In the event you have the Shattered Planet mod enabled, there will be changes made, specifically to the creation of gases, and a couple of buildings will be moved from Shattered to here. At the moment there is no recipe integration with Krastorio 2 Spaced Out or BZ Ores, but will be kept listed from incompatibility; playing with either overhaul will make Vesta more difficult than intended. Planet will go through balancing and changing as players make their suggestions.