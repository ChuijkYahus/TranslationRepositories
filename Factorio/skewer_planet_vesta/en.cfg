[mod-setting-description]
ske_fusion_thruster_og=This setting restores the performance of the Fusion Thruster to its pre-2.0.31 nerfs, resulting in crazy thrust. Get your ships to places super fast and super safe when combined with complementary Fusion Missiles.

ske_realistic_gases=Replaces the colorful gases with more widely accepted variants.

ske_vesta_gases=When off, Vesta will use shared gases. In the event that this mod has incompatibilities with other mods regarding fluids, turn this option on and various gases related to Vesta will be independent. This however does mean there will be duplications.

ske_disable_metal_and_stars_bots=Off by default. If you play with Metal and Stars and would rather not get Anti-Matter Bots from Metal and Stars, turn on this option.

ske_vesta_original_generation=If this option is on, Vesta will have its original generation. Large rock platforms will decorate the surface of the gas giant, having been caught in its field of influence. Great for casual play. If this option is off, then Vesta will be a realistic gas giant, with only Gas Giant Platform as the spawn area and no other land mass. Great for those seeking to challenge themselves.

ske_vesta_legacy_recipes=Restores original 1.0 recipes and technology chain; this version of Vesta involves more intermediates and involves buildings that may have exclusive use on the planet. New content for the planet will generally be relegated here. If you wish for a much easier and streamlined experience, please turn this option off.

ske_easy_fluids=If this option is turned on, most recipes on Vesta will require much less gases. This option has no effect on Complex Mode.

