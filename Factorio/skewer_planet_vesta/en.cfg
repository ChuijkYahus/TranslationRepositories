[technology-description]
dt-fuel=A deuterium-tritium combination acts as the catalyst for multiple plasma based reactions.
hot-lithium-production=Heat as a catalyst will cause a reaction in lithium that allows for the extraction of tritium.
tritium-production=Tritium is an important product for plasma based processes.
hot-heavy-water-production=The heating of heavy water and hydrogen sulfide allows one to easily extract deuterium. 
deuterium-production=Deuterium is an important product for plasma based processes.
s1_cluster_processing=Iron and copper traces have been found calcized on nearby rocks. The rocks appear to have a form of algae living on them that is depositing common metals in crystalized forms.
s1_ammonia_chilled_plate=Steel and iron when heated together and rapidly chilled creates an alloy that can withstand extreme temperatures.
s1_brine=Treating water into brine is an important step to the production of tritium gas. Hmm, haven't I seen this process somewhere before?
s1_exotic_algae=More exotic algae recipes can be studied.
s1_iridium_plate=The iridium plate can handle the extreme temperatures that the magnetizing process produces.
s1_nutrients_from_co2=Carbon dioxide gas appears to host the most hospitable environment for Vesta's micro organisms.
s1_vestan_char=Carbon can be further heated and processed into a more easily burnable material.
s1_sandceramicmesh=Sometimes in order to go big!.. you have to start small. Crushingly small actually.
fusion-missile=Magnetic alloys can be used to house volatile plasma that is both powerful and spreading. These rockets yield high damage and high radius. 
ske_fusion_thruster=Our thrusters can be further upgraded and refined, now utilizing the power of plasma to push our platforms faster and further than ever before on a more energy effecient power source.
ske_fusion-thruster=Our thrusters can be further upgraded and refined, now utilizing the power of plasma to push or platforms faster and further than ever before on a more energy effecient power source.
s2_transport-belt-capacity-vesta=Transport belt capacity Vesta
s2_worker-robots-storage-vesta=Worker robot cargo size Vesta
transport-belt-capacity-vesta=Transport belt capacity Vesta
worker-robots-storage-vesta=Worker robot cargo size Vesta

s1_dueterium=The production of more advanced fusion fuels can be realized by harnessing the elements within Vesta's atmosphere. By breaking down various compounds, they can be reshaped and remade into purities hydrogen isotopes. Deuterium and tritium are required for the production of iridium quite strangely enough.
s1_iridium=Iridium plates have enough durability and heat resistance to provide a warm environment for algae to grow without being killed by the heat.
s1_algea_discovery=The various gases inside of Vesta's atmosphere are also home to plenty of microbial species. Traces of these microbes can be harvested from the gases, and with careful cultivation, can be host to our only method of obtaining resources, including iron and copper.
s1_algea_extracting=Vesta's algae are incredibly potent and well evolved. If fed certain gases and heat, it will change its composition and grow metallic compounds similar to Gleba's bacterial microbes. These metallic compounds can then be further treated under combustion to produce various metallic resources.
s1_gas_manipulation_science_pack=Research into various gas related technology enhancements
s2_fusion_enhancements=Further enhance our fusion power breakthroughs.

planet-discovery-vesta=Explore the mostly gasous giant, Vesta. There appear to be rocky formations caught in its gas field. The gasous area is a concoction of many simple forms of gas, including hydrogen, nitrogen, carbon dioxide and helium. There appear to be trace amounts of various impurities inside of the gas field that can be filtered out.

s1_algea_filtering=Filters allow us to easily catch algae concentrations that have been cultured in our water supplies. Not just any filter will work however, they have to be specially developed to separate algae without damage to its structure.
s1_algea_filtering_2=Filters can be cleaned which grants us back a filter as well as some bonus algae.

s1_algea_oversaturation=Overfeeding Vesta native algae causes it to become highly nutritious. It can work as a local substitute for nutrients and doesn't decay overtime!

s1_algea_culturing=The various gases inside of Vesta's atmosphere are also home to plenty of microbial species. Traces of these microbes can be harvested from the gases, and with careful cultivation, can be host to our only method of obtaining resources, including iron and copper.

s1_algea_treatment=Vesta's algae are incredibly potent and well evolved. If fed certain gases and heat, it will change its composition and grow metallic compounds similar to Gleba's bacterial microbes. These metallic compounds can then be further treated under combustion to produce various metallic resources.

s1_electrolysis=Sometimes heat is not the answer to our problems, but electricity is. By introducing large amounts of volts to differing forms of matter, we can change its composition. Some forms of algae may react to being introduced to electricity in unexpected ways.

s1_supermagnet=Utilizing high electrical currents in a torrus allows us to create fields of intense magnetic energies. These fields can be uses to agitate and energize various resources to activate them. Some algae may react differently than expected to these energies.

s1_t2d2=The production of more advanced fusion fuels can be realized by harnessing the elements within Vesta's atmosphere. By breaking down various compounds, they can be reshaped and remade into purities which can further enhance our fusion power breakthroughs.

s2_fusion_robots=With advanced energy generation available to us now, it only makes sense we upgrade our logistics and robotic capabilities with the same technology. These robots will be powered by DT-based fusion power and will never require recharging, allowing them to work perpetually.

s2_plasma_pipes=Plasma from fusion reactions normally could not be moved or manipulated, until now. By crafting copper coils around a strengthened piping frame, and lining the interiors with strong, heat resistant promethium alloys, we can freely move plasma where we wish. However, due to the nature of the element we're manipulating, the pipes can not be placed under terrain.

s2_plateworkings=Hydrogen and oxygen make for great catalysts when smelting our ores. We can increase the yield of our basic metals like copper and iron if we use one of the two gases in combustion. Hydrogen yields more for a slightly slower processing rate where as oxygen processes extremely fast.

s2_intermediate_productivity=Increase the production of the most commonly crafted items.

s1_algea_rare_metals=Rare metals are necessary for the production of processing units and other items, but there is no source of rare metals on Vesta. We can culture a breed of algae that will calcize these metals for us. 

ske_heating_conductor=Heat is sometimes the only catalyst that can create a change in molecular structure. The heating conductor can take multiple fluids or items and expose them to intense heat for composing a new material.

hydrogen-sulfide=Hydrogen sulfide is a necessary resource in the production of deuterium gas. If we can produce it off Vesta, then making Fusion Robots directly on other planets becomes less of a dream and more of a reality.

ske_carbon_dioxide_offworld=The production of Carbon dioxide should be a simple task of heating a source of carbon to extreme temperatures and combining with a source of oxygen, such as water.
carbon-dioxide=The production of Carbon dioxide should be a simple task of heating a source of carbon to extreme temperatures and combining with a source of oxygen, such as water.

ske_working_with_gases=Gases make up a majority of the resources on Vesta. We can harvest the gases from the sea of clouds by using offshore pumps.
ske_gas_giant_platform=Expanding on the sea of clouds isn't as difficult as one expects. The sea is dense enough to support even the heaviest of foundational engineering, allowing us to expand with ease.

