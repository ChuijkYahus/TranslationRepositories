[mod-name]
rec-blue-plus=递归蓝图+ [Recursive Blueprints+]

[mod-description]
rec-blue-plus=自动化蓝图，建立自我扩张的工厂。\n递归蓝图的分叉版，新增了若干小功能。

[controls]
give-rbp-tool=偏移计算工具
give-rbp-area-viewer=蓝图自动部署箱区域指示器

[shortcut-name]
give-rbp-tool=偏移计算工具
give-rbp-area-viewer=蓝图自动部署箱区域指示器

[entity-name]
blueprint-deployer=蓝图部署器
blueprint-deployer2=蓝图自动部署箱（BAD箱）
recursive-blueprints-scanner=区域扫描器

[item-description]
blueprint-deployer=[font=default-bold][color=yellow]警告：[/color]此设备已弃用！当前仅为兼容旧蓝图考虑而未完全移除。[/font]\n自动搭建其中的蓝图。
blueprint-deployer2=（Blueprint Automated Deployment）自动搭建其中的蓝图。
recursive-blueprints-scanner=统计区域内物体的总数。
rbp-tool=计算所选区域的尺寸和相对于所选物体的偏移。\n左键点击 - 选择区域。\nShift + 左键点击 - 将某物体选为参考点。\n右键点击 - 将最后一次获得的数据写入常量运算器。
rbp-area-viewer=显示蓝图自动部署箱的当前选择区域。

[mod-setting-name]
recursive-blueprints-area=区域X、Y位置
recursive-blueprints-logging=部署器日志记录
recursive-blueprints-deployer-deploy-signal=部署器的部署信号
recursive-blueprints-tool-area=偏移工具：区域X、Y位置
recursive-blueprints-tool-coordinates=偏移工具：参考点
recursive-blueprints-limit-library=禁止从蓝图库复制
recursive-blueprints-alerts-interval=消息最短间隔

[mod-setting-description]
recursive-blueprints-area=默认情况下，将收到的坐标（X、Y信号）解释为（蓝图、红图、绿图）区域的“角落”还是“中心”。
recursive-blueprints-logging=显示调试信息的条件。
recursive-blueprints-deployer-deploy-signal=选择“两者”时，信号“0”优先。\n为嵌套导航信号一致性考虑，也为避免使用物品信号控制部署器，可使用信号“0”而非建设机器人。
recursive-blueprints-tool-area=计算区域中的哪一点？
recursive-blueprints-tool-coordinates=选择什么类型的坐标？\n使用相对坐标时，必须选择某个建筑作为参考点（使用Shift + 左键点击以选择）。
recursive-blueprints-limit-library=禁止命令2和命令102作用于蓝图库。这些命令会将库中蓝图/蓝图簿复制为物品，过程中使用导出/导入功能。大型蓝图和蓝图簿会导致卡顿。勾选此项即可从根源上消除此类卡顿。
recursive-blueprints-alerts-interval=本模组的错误信息会被发送至聊天。为避免消息轰炸，同类型消息在所给刻数间不会重复发送。

[string-mod-setting]
recursive-blueprints-area-center=中心
recursive-blueprints-area-corner=角落
recursive-blueprints-logging-never=从不
recursive-blueprints-logging-with_L_greater_than_zero=“L>0”信号时
recursive-blueprints-logging-with_L_greater_or_equal_to_zero=“L>=0”信号时
recursive-blueprints-logging-always=始终
recursive-blueprints-deployer-deploy-signal-construction_robot=建设机器人
recursive-blueprints-deployer-deploy-signal-zero=0（零）
recursive-blueprints-deployer-deploy-signal-both=两者
recursive-blueprints-tool-area-center=中心
recursive-blueprints-tool-area-corner=角落
recursive-blueprints-tool-coordinates-relative=相对（偏移）
recursive-blueprints-tool-coordinates-absolute=绝对

[virtual-signal-name]
rbp-book-layer1=第1层槽号
rbp-book-layer2=第2层槽号
rbp-book-layer3=第3层槽号
rbp-book-layer4=第4层槽号
rbp-book-layer5=第5层槽号
rbp-book-layer6=第6层槽号
rbp-command=蓝图自动部署命令
rbp-cancel=取消标志
rbp-enviroment=环境标志
rbp-invert-filter=反转标志
rbp-rotate-bp=旋转参数
rbp-superforce=超级强制标志
rbp-quality=品质标志
rbp-center=区域中心标志
rbp-absolute=绝对坐标标志
rbp-wait=重复前等待
rbp-library=地图蓝图库索引

[virtual-signal-description]
rbp-book-layer1=指定使用蓝图簿内对应槽位处的蓝图。
rbp-book-layer2=指定使用蓝图簿中蓝图簿内对应槽位处的蓝图。
rbp-book-layer3=指定使用蓝图簿下蓝图簿中蓝图簿内对应槽位处的蓝图（应该还好理解吧）。
rbp-book-layer4=第四层嵌套蓝图簿内选用的槽位号。
rbp-book-layer5=第五层嵌套蓝图簿内选用的槽位号。
rbp-book-layer6=第六层嵌套蓝图簿内选用的槽位号。如果你主动用到了这个信号，那你就是递归蓝图系统的递归大师了！
rbp-command=蓝图自动部署箱（BAD箱）的命令信号。各命令的描述见提示与技巧。
rbp-cancel=使用红图（拆除规划）和绿图（升级规划）时取消拆除和升级。
rbp-enviroment=使用参数拆除（命令11）时设置“仅树木和岩石”筛选器。
rbp-invert-filter=在参数拆除中使用黑名单。
rbp-rotate-bp=部署蓝图时进行旋转。（1 -> 顺时针90°，2 -> 180°，3 -> 逆时针90°）
rbp-superforce=部署蓝图或进行拆除时使用超级强制模式。
rbp-quality=在参数拆除（命令11）中使用“任何品质”筛选器。
rbp-center=接收到的“X”“Y”信号解析为区域中心而非角落。
rbp-absolute=接收到的“X”“Y”信号解析为绝对坐标而非偏移量。
rbp-wait=持续收到信号时不立刻重复执行。详情见提示与技巧。
rbp-library=指定在地图蓝图库中选用的槽位号。

