[tips-and-tricks-item-name]
recursive-pb-common=递归蓝图+
recursive-bp-offset-tool=偏移计算工具

[tips-and-tricks-item-description]
recursive-pb-common=递归蓝图+添加了2种为自动化蓝图而设计的设备。\n所有设备均可用信号网络控制。\n\n[font=default-bold]所有设备通用的信号[/font]\n默认情况下，[img=virtual-signal.signal-X]和[img=virtual-signal.signal-Y]的值分别指定应从设备出发水平和垂直移动多少个地格（向右、向下为正方向）。若[virtual-signal=rbp-absolute]>0，则上述信号会被解析为绝对坐标。\n后续的提示中，这三个信号的组合整体称作[color=yellow]坐标[/color]。\n\n[img=virtual-signal.signal-W]和[img=virtual-signal.signal-H]的值分别指定区域的宽度和高度。\n该区域的具体位置有两种计算方式，取决于[color=yellow]坐标[/color]指向的是区域的角落还是中心。\n这一选择由[virtual-signal=rbp-center]控制：>0为中心，<0为角落，=0使用模组（对该地图）的“[font=default-bold]__1__[/font]”设置。\n若选择的是角落，则宽度和高度就等价于相对[color=yellow]坐标[/color]的偏移量，因此可以使用负数值。\n若选择的是中心，则负值的宽高没有实际意义，此时会忽略值的符号。\n后续的提示中，这六个信号的组合整体称作[color=yellow]区域[/color]。
recursive-pb-scanner=统计指定[color=yellow]区域[/color]内物体的总数，并将结果作为信号输出至网络。\n由于建筑、虚影等部分类别物品使用的是同一种信号，扫描时有必要指定筛选器，对应控制信号为[img=virtual-signal.signal-F]。点击界面中的筛选信号按钮，可打开信号值与筛选效果的映射计算器。\n扫描不会持续进行，而是只会在任意输入信号改变时触发一次。

[rbp-tnt-description-parts]
tool-area-viewer=[font=default-bold]可视化检验[/font]\n在向设备发送[color=yellow]坐标[/color]或[color=yellow]区域[/color]后，可以查看这些信号的指向效果——使用“蓝图自动部署箱区域指示器”选择相应设备即可。

deployer-intro=此版本仅使用原版信号控制。
deployer-control=[img=virtual-signal.signal-0]信号代表“使用物品栏中的物品”。具体效果随物品而定。\n（在之前的版本中，递归蓝图系统使用的是[img=item.construction-robot]，但现在已改为使用专门的虚拟信号，即不再用[font=default-bold]物品[/font]信号。使用旧蓝图时请查看与更改控制信号有关的地图设置。）
deployer-plans=对指定[color=yellow]区域[/color]使用红图（拆除规划）和绿图（升级规划）。部署器永远不会将自身标记为拆除。\n若[img=virtual-signal.signal-0]<0，则红图和绿图会以“取消”模式使用。
deployer-book=操作的效果取决于所选物品。\n若[img=virtual-signal.signal-0]<0，则忽略数值的符号，且红图和绿图会以“取消”模式使用。
deployer-misc=[font=default-bold]其他命令。[/font]\n[img=item.deconstruction-planner]用作独立命令：\n-1 = 对指定[color=yellow]区域[/color]使用红图，忽略筛选器。部署器永远不会将自身标记为拆除。\n-2 = 将部署器标记为拆除。\n-3 = 取消指定[color=yellow]区域[/color]内的拆除指令。\n后续的4个命令使用物品信号来配置红图筛选器：\n-4 = 拆除，白名单。\n-5 = 拆除，黑名单。\n-6 = 取消拆除，白名单。\n-7 = 取消拆除，黑名单。\n在物品信号之外还接受专门的筛选信号：[img=virtual-signal.signal-T] = 树木，[img=virtual-signal.signal-R] = 岩石，[img=virtual-signal.signal-C] = 悬崖。
deployer-copy=[font=default-bold]复制/删除蓝图。[/font]

blueprint-item=在指定[color=yellow]坐标[/color]部署蓝图。模式为“强制”：放置所有可以放置的物品，忽略障碍物，会对水域使用填埋材料，相撞的树木、岩石均标记为拆除。\n如需更改蓝图的中心，可启用网格尺寸（推荐1x1），并设置绝对参考点。\n其他参数：\n__1__信号会旋转蓝图。1 -> 顺时针90°，2 -> 180°，3 -> 逆时针90°。\n__2__>0：使用“超级强制”建设模式（即“强制”加上拆除相撞的友方单位）。
book-navigation=__1__信号指示了蓝图簿中所选用槽位的编号。若该槽位中有蓝图簿，则选择该蓝图簿中编号为__2__信号值的槽位。若该槽位同样放有蓝图簿，则使用__3__的信号值进行选择，以此类推直至__4__的信号值。
action-copy-bp=__1__将蓝图或蓝图簿复制至部署器的物品栏。\n蓝图原件必须存放在箱子（或可读取抓取物的机械臂）中，且必须与部署器处于同一个信号网络。若网络中有多份蓝图，则选用信号线跳数最少的进行复制。
action-delete-bp=__1__删除部署器物品栏中的蓝图或蓝图簿。\n（不会移除外部物品，所以不要试图把专用设备当作垃圾桶！）
action-debug=[font=default-bold]调试[/font]\n[img=virtual-signal.signal-L]用于显示调试信息（必须在模组设置中启用触发条件）。每次触发后都会向聊天栏发送消息，其中包含部署器所在位置、蓝图名称，以及蓝图的放置位置（若指定了[color=yellow]坐标[/color]）。\n[color=yellow][font=default-bold]警告[/font][/color]：若消息发送速度过快，聊天栏可能会省略部分消息。

deployer2-intro=此版本使用自定义信号控制。\n\n[font=default-bold]控制信号[/font]\n__1__信号用于控制。具体操作和所需参数取决于信号值。会影响操作的信号值以方括号括出。
deployer2-timings=[font=default-bold]时间信号[/font]\n设备会在每一刻都执行命令。预期中命令信号应使用脉冲形式发送。若受其他原因影响，控制命令变为了持续信号，则需要使用可选的__1__信号设置命令重复执行间隔。内部计时器会在__1__或__2__信号变动时重置。其他信号的变动不纳入考量。
deployer2-navigation=[font=default-bold]蓝图簿导航信号[/font]\n__1__代表“在嵌套的蓝图簿内选取导航路线”。
deployer2-library=__1__信号指示了地图蓝图库内的槽位编号。（目前用于命令1、2、102。）
deployer2-wires=[font=default-bold]信号线使用[/font]\n默认情况下，红线和绿线会整合为单个输入。\n[color=yellow]2W[/color]记号代表区分红线和绿线的输入。所有带[color=yellow]2W[/color]记号的命令都会将输入分为主输入和辅输入。收到__1__信号的信号线视为[color=yellow]主输入[/color]。若红绿线均收到了这个信号，则忽略该命令。\n主输入接受命令和参数，与其他命令类似。\n只有带[color=yellow]2W[/color]记号的命令会用到辅输入，通常是为读写远程信号。
deployer2-com-header=[font=default-bold]命令列表[/font]
deployer2-com1=[font=default-bold][[color=red]1[/color]][/font]：使用物品栏内的物品。具体效果随物品而定。
deployer2-com1-plans=对指定[color=yellow]区域[/color]使用红图（拆除规划）和绿图（升级规划）。
deployer2-com1-book=具体效果随物品而定。
deployer2-com2=[font=default-bold][[color=red]2[/color]][/font]：与[font=default-bold][[color=red]1[/color]][/font]相同，但若物品为蓝图，则应用参数（将参数信号替换为所给信号，同时替换数值）。
deployer2-com2-signals=[font=default-bold]参数替换：[/font]数字信号（即[img=virtual-signal.signal-0]到[img=virtual-signal.signal-9]）指示需替换的参数。数字信号的值指示使用当前信号中的哪一个进行替换（判断标准为信号值相等）。例外：数值为1到9会替换为相应的数字信号，数值为10则替换为[img=virtual-signal.signal-0]信号。\n例如，如需将[img=item.parameter-1]替换为[img=item.iron-gear-wheel]，输入中应包含[img=item.iron-gear-wheel]=11和[img=virtual-signal.signal-1]=11两种信号。
deployer2-com2-numbers=[font=default-bold]数值替换：[/font]一对字母信号（[img=virtual-signal.signal-A]-[img=virtual-signal.signal-K]、[img=virtual-signal.signal-B]-[img=virtual-signal.signal-L]等，最大可为[img=virtual-signal.signal-J]-[img=virtual-signal.signal-T]）指示需替换的数值和替换用数值。\n例如，如需将“5001”替换为“10”，输入中应包含[img=virtual-signal.signal-A]=5001和[img=virtual-signal.signal-K]=10两种信号。
deployer2-com2-info=[font=default-bold]注意事项：[/font]此参数化过程不支持配方、公式、炮塔筛选器/优先级的参数组件。如果遇到了重大错误，模组会向聊天栏发送错误信息。请将此类情况告知模组作者。

deployer2-com10=[font=default-bold][[color=red]10[/color]][/font]：对指定[color=yellow]区域[/color]使用红图（拆除规划），忽略筛选器。（__1__）
deployer2-com11=[font=default-bold][[color=red]11[/color]][/font]：对指定[color=yellow]区域[/color]使用红图（拆除规划），带筛选器（物品信号）。（__1__）\n__2__>0：仅树木和岩石模式。此时会忽略物品信号。\n__3__>0：将指定物品添加至筛选器，并标记为“任何品质”。
deployer2-com20=[font=default-bold][[color=red]20[/color]][/font]：对指定[color=yellow]区域[/color]使用绿图（升级规划），忽略筛选器。（__1__）

deployer2-com30=[font=default-bold][[color=red]30[/color]][/font]：读取指定[color=yellow]坐标[/color]处常量运算器的信号。（[color=yellow]2W[/color] __1__）\n__2__：选择读取哪一个编组（为0时读取全部）。\n__3__>0：即便编组未启用，也读取编组的信号。
deployer2-com31=[font=default-bold][[color=red]31[/color]][/font]：向指定[color=yellow]坐标[/color]处的常量运算器写入信号。（[color=yellow]2W[/color] __1__）\n__2__>0：同时禁用所选编组。
deployer2-com32=[font=default-bold][[color=red]32[/color]][/font]：开启/关闭指定[color=yellow]坐标[/color]处的常量运算器。（__1__）
deployer2-com33=[font=default-bold][[color=red]33[/color]][/font]：清空指定[color=yellow]坐标[/color]处的常量运算器。
deployer2-com34=[font=default-bold][[color=red]34[/color]][/font]：读取指定[color=yellow]坐标[/color]处信号线的信号。（[color=yellow]2W[/color] __1__）\n__1__：选择读取对象：1 - 红线，2 - 绿线，3 - 两者。
deployer2-com40=[font=default-bold][[color=red]40[/color]][/font]：清空输出信号。
deployer2-com41=[font=default-bold][[color=red]41[/color]][/font]：重置部署器输入/输出状态。

deployer2-com100=[font=default-bold][[color=red]100[/color]][/font]：将蓝图或蓝图簿复制到蓝图自动部署箱（BAD箱）的物品栏（搜索信号线）。（__1__）\n__2__>0：即便物品栏非空，也允许替换内容物。\n[font=default-bold]注意事项：[/font]蓝图原件必须存放在箱子（或可读取抓取物的机械臂）中，且必须与部署器处于同一个信号网络。若网络中有多份蓝图，则选用信号线跳数最少的进行复制。
deployer2-com101=[font=default-bold][[color=red]101[/color]][/font]：将蓝图或蓝图簿复制到蓝图自动部署箱（BAD箱）的物品栏（搜索坐标）。（__1__）\n[font=default-bold]注意事项：[/font]蓝图原件必须存放在指定[color=yellow]坐标[/color]处的箱子中。蓝图自动部署箱（BAD箱）可以从自身复制，从而可以提取蓝图簿的内容物。
deployer2-com102=[font=default-bold][[color=red]102[/color]][/font]：将蓝图库中的蓝图或蓝图簿复制到蓝图自动部署箱（BAD箱）的物品栏。（__1__）\n
deployer2-com120-head=[font=default-bold][[color=red]120[/color]][/font]：

offset-tool0=此工具可计算所选择区域对应的信号。工具的参数配置见模组设置（个性设置）。\n拿起工具（位于工具栏）并按照如下步骤操作：
offset-tool1=1. 选择参考点：按住 __CONTROL__select-for-cancel-deconstruct__ 并选择[entity=blueprint-deployer2]、[entity=recursive-blueprints-scanner]或任意建筑。
offset-tool2=2. 偏移测量：按住 __CONTROL__select-for-blueprint__ 并选择[color=yellow]区域[/color]。偏移信号值会发送至聊天栏，原样使用即可。也可继续至下一步。
offset-tool3=3. 写入常量运算器：按住 __CONTROL__reverse-select__ 或 __CONTROL__deselect__ 并选择[entity=constant-combinator]，以向其写入最后一次测量的结果。写入仅作用于第一个编组，相应信号若已存在则覆写。
offset-tool4=注意事项：最后一次测量的参考点会单独按玩家进行存储，因此在步骤间可以“放下”工具。