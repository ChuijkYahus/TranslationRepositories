[tips-and-tricks-item-description]
secretas=You can collect [item=outer-rim-solid-state-battery] and [item=outer-rim-advanced-processing-unit] from the defensive units still left on Secretas by destroying them with a [entity=outer-rim-magnetic-collector] nearby. The items can be found inside the [entity=outer-rim-magnetic-collector]. \n\n The enemies can be drawn in by pollution, building near them or by artillery.

