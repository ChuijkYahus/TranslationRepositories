[mod-description]
skewer_shattered_planet=Beyond the ever dark expanse lies the event horizon, the final frontier. The Shattered Planet. This devastated world holds one lone patch of uranium which is the key to solving its mystery. Enter the world of isotopes as you break down radioactive particles into increasingly more powerful substances, and beyond. Recommended to played with Fusion Powered Robots and Tinted Centrifuges. There is currently no support for Krastorio 2 Spaced Out or BZ Ores, so please keep this in mind if you do a playthrough with this mod. Full integration with Planet Vesta has been added, and this mod's progression will be altered requiring Vesta to have been completed if you choose to install and activate it.