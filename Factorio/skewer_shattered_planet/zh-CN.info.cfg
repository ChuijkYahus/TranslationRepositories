[mod-name]
skewer_shattered_planet=○🌐破碎星球 [Shattered Planet]

[mod-description]
skewer_shattered_planet=在黑暗深空的远端有着一道事件视界，一道最终的边界。破碎星球。这个被摧毁殆尽的星球上有一片孤零零的铀矿，这也是解开它秘密的关键。踏入同位素的世界，将放射性粒子拆解成愈来愈强大的物质，超越极限。建议和聚变动力机器人（Fusion Powered Robots）和离心机染色（Tinted Centrifuges）一起使用。到目前为止，本模组还未和Krastorio 2 Spaced Out及BZ Ores有兼容支持，在游玩本模组时务必注意。本模组与灶神星（Planet Vesta）有完整兼容，安装并启用该模组后，本模组的游戏内容需要完成灶神星内容后才可用。