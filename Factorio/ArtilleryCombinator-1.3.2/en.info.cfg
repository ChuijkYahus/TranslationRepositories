[mod-name]
ArtilleryCombinator=Artillery Combinator

[mod-description]
ArtilleryCombinator=A combinator that lets you target places on the map with your artillery via the circuit network. X and Y to set the relative position. It's the absolute position if signal A > 0. Send an 'Artillery Remote' signal to order your artillery to shoot. Updated to 2.0 by Phoenix-D. Basic support- may still have bugs.